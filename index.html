<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alarma ESP32</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0f0f14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Alarma">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f14;
      color: #e8e8f0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .header h1 {
      font-size: 13px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #5a5a7a;
      margin-bottom: 12px;
    }

    .status-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid #1e1e2e;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      transition: border-color 0.4s ease, box-shadow 0.4s ease;
    }

    .status-ring.armado {
      border-color: #ff4455;
      box-shadow: 0 0 30px rgba(255, 68, 85, 0.2);
    }
    .status-ring.desarmado {
      border-color: #44cc88;
      box-shadow: 0 0 30px rgba(68, 204, 136, 0.2);
    }
    .status-ring.conectando {
      border-color: #5588ff;
      animation: pulsar 1.2s ease-in-out infinite;
    }
    .status-ring.alerta {
      border-color: #ff4455;
      animation: alerta 0.5s ease-in-out infinite;
    }

    @keyframes pulsar {
      0%, 100% { box-shadow: 0 0 20px rgba(85, 136, 255, 0.2); }
      50%       { box-shadow: 0 0 40px rgba(85, 136, 255, 0.5); }
    }
    @keyframes alerta {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 68, 85, 0.2); }
      50%       { box-shadow: 0 0 60px rgba(255, 68, 85, 0.8); }
    }

    .status-icon { font-size: 36px; }

    .status-text {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #5a5a7a;
      text-align: center;
    }
    .status-text span {
      display: block;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.15em;
      margin-top: 4px;
      transition: color 0.4s ease;
    }
    .status-text span.armado      { color: #ff4455; }
    .status-text span.desarmado   { color: #44cc88; }
    .status-text span.desconectado{ color: #5a5a7a; }
    .status-text span.conectando  { color: #5588ff; }
    .status-text span.alerta      { color: #ff4455; }

    .card {
      background: #16161f;
      border: 1px solid #1e1e2e;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn:active   { transform: scale(0.97); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .btn-conectar { background: #1e1e2e; color: #5588ff; border: 1px solid #5588ff44; }
    .btn-conectar:hover:not(:disabled) { background: #5588ff15; border-color: #5588ff; }
    .btn-conectar.conectado { color: #44cc88; border-color: #44cc8844; }
    .btn-conectar.conectado:hover:not(:disabled) { background: #44cc8815; border-color: #44cc88; }

    .btn-toggle {
      background: #ff445518; color: #ff4455;
      border: 1px solid #ff445544; padding: 20px; font-size: 13px;
    }
    .btn-toggle:hover:not(:disabled) { background: #ff445530; border-color: #ff4455; }
    .btn-toggle.desarmado-estado { background: #44cc8818; color: #44cc88; border-color: #44cc8844; }
    .btn-toggle.desarmado-estado:hover:not(:disabled) { background: #44cc8830; border-color: #44cc88; }

    .btn-notif { background: #1e1e2e; color: #ffaa44; border: 1px solid #ffaa4444; font-size: 11px; padding: 12px; }
    .btn-notif:hover:not(:disabled) { background: #ffaa4415; border-color: #ffaa44; }
    .btn-notif.activo { color: #44cc88; border-color: #44cc8844; }

    .divider { height: 1px; background: #1e1e2e; }

    .log {
      font-size: 10px;
      letter-spacing: 0.05em;
      line-height: 1.8;
      min-height: 48px;
      border-top: 1px solid #1e1e2e;
      padding-top: 16px;
    }
    .log p          { color: #5a5a8a; }
    .log p.ok       { color: #44cc88; }
    .log p.err      { color: #ff4455; }
    .log p.info     { color: #5588ff; }
    .log p.warn     { color: #ffaa44; }

    #installBanner {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1e2e;
      border: 1px solid #5588ff44;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 11px;
      color: #5588ff;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-align: center;
      white-space: nowrap;
    }
    #installBanner:hover { background: #5588ff15; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Sistema de Alarma</h1>
    <div class="status-ring" id="ring">
      <span class="status-icon" id="icono">🔒</span>
    </div>
    <div class="status-text">
      Estado
      <span id="estadoTexto" class="desconectado">DESCONECTADO</span>
    </div>
  </div>

  <div class="card">
    <button class="btn btn-conectar" id="btnConectar" onclick="conectar()">
      ⬡ Conectar a Alarma-ESP32
    </button>

    <button class="btn btn-notif" id="btnNotif" onclick="pedirPermisoNotif()">
      🔔 Activar notificaciones
    </button>

    <div class="divider"></div>

    <button class="btn btn-toggle" id="btnToggle" onclick="toggle()" disabled>
      ⏻ Armar / Desarmar
    </button>

    <div class="log" id="log">
      <p>Esperando conexión BLE...</p>
    </div>
  </div>

  <!-- Banner de instalación PWA -->
  <div id="installBanner" onclick="instalarPWA()">
    ⬇ Instalar app en pantalla de inicio
  </div>

  <script>
    // ─── Configuración ────────────────────────────────────────────────
    const DEVICE_NAME       = 'Alarma-ESP32-v3';
    const SERVICE_UUID      = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
    const CHAR_CONTROL_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
    const CHAR_NOTIFY_UUID  = 'beb5483e-36e1-4688-b7f5-ea07361b26a9';
    const PIN               = '1234';

    // ─── Estado ───────────────────────────────────────────────────────
    let device      = null;
    let charControl = null;
    let charNotify  = null;
    let armado      = true;
    let notifActivas = false;
    let deferredPrompt = null;
    let autenticado = false; 

    // ─── DOM ──────────────────────────────────────────────────────────
    const ring          = document.getElementById('ring');
    const icono         = document.getElementById('icono');
    const estadoTexto   = document.getElementById('estadoTexto');
    const btnConectar   = document.getElementById('btnConectar');
    const btnToggle     = document.getElementById('btnToggle');
    const btnNotif      = document.getElementById('btnNotif');
    const logEl         = document.getElementById('log');
    const installBanner = document.getElementById('installBanner');

    // ─── Service Worker ───────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('[PWA] Service Worker registrado.'))
        .catch(err => console.error('[PWA] Error SW:', err));
    }

    // ─── Capturar evento de instalación PWA ──────────────────────────
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      installBanner.style.display = 'block';
    });

    window.addEventListener('appinstalled', () => {
      installBanner.style.display = 'none';
      deferredPrompt = null;
      log('¡App instalada en pantalla de inicio!', 'ok');
    });

    async function instalarPWA() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') installBanner.style.display = 'none';
      deferredPrompt = null;
    }

    // ─── Log ──────────────────────────────────────────────────────────
    function log(msg, tipo = '') {
      const p = document.createElement('p');
      p.textContent = '› ' + msg;
      if (tipo) p.className = tipo;
      logEl.innerHTML = '';
      logEl.appendChild(p);
    }

    // ─── Notificaciones del sistema ───────────────────────────────────
    async function pedirPermisoNotif() {
      if (!('Notification' in window)) {
        log('Notificaciones no soportadas en este navegador.', 'err');
        return;
      }
      const permiso = await Notification.requestPermission();
      if (permiso === 'granted') {
        notifActivas = true;
        btnNotif.textContent = '🔔 Notificaciones activas';
        btnNotif.className = 'btn btn-notif activo';
        log('Notificaciones activadas.', 'ok');
      } else {
        log('Permiso de notificaciones denegado.', 'err');
      }
    }

    function enviarNotif(titulo, cuerpo) {
      if (!notifActivas || Notification.permission !== 'granted') return;
      if (navigator.serviceWorker.controller) {
        // Vía Service Worker → funciona en segundo plano en Android
        navigator.serviceWorker.controller.postMessage({ titulo, cuerpo });
      } else {
        // Fallback directo (solo funciona con la app en primer plano)
        new Notification(titulo, { body: cuerpo });
      }
    }

    // ─── UI ───────────────────────────────────────────────────────────
    function actualizarUI() {
      if (!device || !device.gatt.connected) {
        ring.className = 'status-ring';
        icono.textContent = '🔒';
        estadoTexto.className = 'desconectado';
        estadoTexto.textContent = 'DESCONECTADO';
        btnConectar.textContent = '⬡ Conectar a Alarma-ESP32';
        btnConectar.className = 'btn btn-conectar';
        btnToggle.disabled = true;
        btnToggle.className = 'btn btn-toggle';
        btnToggle.textContent = '⏻ Armar / Desarmar';
        return;
      }

      btnConectar.textContent = '⬡ Desconectar';
      btnConectar.className = 'btn btn-conectar conectado';
      btnToggle.disabled = !autenticado;

      if (armado) {
        ring.className = 'status-ring armado';
        icono.textContent = '🔴';
        estadoTexto.className = 'armado';
        estadoTexto.textContent = 'ARMADO';
        btnToggle.className = 'btn btn-toggle';
        btnToggle.textContent = '⏻ Desarmar';
      } else {
        ring.className = 'status-ring desarmado';
        icono.textContent = '🟢';
        estadoTexto.className = 'desarmado';
        estadoTexto.textContent = 'DESARMADO';
        btnToggle.className = 'btn btn-toggle desarmado-estado';
        btnToggle.textContent = '⏻ Armar';
      }
    }

    // ─── Mensajes BLE entrantes del ESP32 ────────────────────────────
    function manejarNotificacionBLE(event) {
      const msg = new TextDecoder().decode(event.target.value);
      console.log('[BLE] Mensaje recibido:', msg);

      // ── Autenticación ──────────────────────────────────────────────────
      if (msg.startsWith('AUTH:TOKEN:')) {
        const token = msg.replace('AUTH:TOKEN:', '');
        localStorage.setItem('alarma_token', token);
        autenticado = true;
        log('Dispositivo registrado y autorizado.', 'ok');
        actualizarUI();
        return;
      }
      if (msg === 'AUTH:OK') {
        autenticado = true;
        log('Autenticado correctamente.', 'ok');
        actualizarUI();
        return;
      }
      if (msg === 'AUTH:FAIL') {
        localStorage.removeItem('alarma_token');
        autenticado = false;
        log('Token invalido. Reconectando en 3s...', 'err');
        setTimeout(async () => {
          try {
            const server  = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            charControl   = await service.getCharacteristic(CHAR_CONTROL_UUID);
            charNotify    = await service.getCharacteristic(CHAR_NOTIFY_UUID);
            await charNotify.startNotifications();
            charNotify.addEventListener('characteristicvaluechanged', manejarNotificacionBLE);
            await charControl.writeValue(new TextEncoder().encode('0000'));
            log('PIN maestro enviado. Esperando registro...', 'info');
          } catch(e) {
            log('Error al reconectar: ' + e.message, 'err');
          }
        }, 3000);
        return;
      }

      // ── Mensajes normales (solo si autenticado) ────────────────────────
      if (!autenticado) return;

      if (msg.startsWith('ESTADO:')) {
        armado = msg.replace('ESTADO:', '') === 'ARMADO';
        actualizarUI();
        if (armado) {
          log('Sistema armado.', 'warn');
          enviarNotif('Alarma Armada', 'El sistema fue armado.');
        } else {
          log('Sistema desarmado.', 'ok');
          enviarNotif('Alarma Desarmada', 'El sistema fue desarmado.');
        }
      }
      else if (msg === 'ALERTA:PUERTA_ABIERTA') {
        ring.className = 'status-ring alerta';
        icono.textContent = '🚨';
        estadoTexto.className = 'alerta';
        estadoTexto.textContent = '¡PUERTA ABIERTA!';
        log('¡ALERTA! Puerta abierta.', 'err');
        enviarNotif('¡ALERTA!', 'La puerta fue abierta con la alarma activa.');
      }
      else if (msg === 'ALERTA:PUERTA_CERRADA') {
        actualizarUI();
        log('Puerta cerrada.', 'ok');
        enviarNotif('Puerta cerrada', 'La puerta volvio a cerrarse.');
      }
    }

    // ─── Conectar ─────────────────────────────────────────────────────
    async function conectar() {
      if (device && device.gatt.connected) {
        device.gatt.disconnect();
        log('Desconectado.');
        autenticado = false;
        actualizarUI();
        return;
      }

      if (!navigator.bluetooth) {
        log('Web Bluetooth no soportado. Usa Chrome en Android.', 'err');
        return;
      }

      try {
        ring.className = 'status-ring conectando';
        icono.textContent = '📡';
        log('Buscando Alarma-ESP32...', 'info');

        device = await navigator.bluetooth.requestDevice({
          filters: [{ name: DEVICE_NAME }],
          optionalServices: [SERVICE_UUID]
        });

        device.addEventListener('gattserverdisconnected', () => {
          log('Conexión perdida.', 'err');
          charControl = null;
          charNotify  = null;
          autenticado = false;
          actualizarUI();
        });

        log('Conectando...', 'info');
        const server  = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);

        charControl = await service.getCharacteristic(CHAR_CONTROL_UUID);
        charNotify  = await service.getCharacteristic(CHAR_NOTIFY_UUID);

        await charNotify.startNotifications();
        charNotify.addEventListener('characteristicvaluechanged', manejarNotificacionBLE);

        log('Conectado. Autenticando...', 'info');

        // Intentar autenticar automáticamente con token guardado
        const tokenGuardado = localStorage.getItem('alarma_token');
        if (tokenGuardado) {
          log('Token encontrado. Verificando...', 'info');
          await charControl.writeValue(new TextEncoder().encode(tokenGuardado));
        } else {
          log('Sin token. Enviando PIN maestro...', 'info');
          await charControl.writeValue(new TextEncoder().encode('0000'));
        }

      } catch (err) {
        log('Error: ' + err.message, 'err');
        ring.className = 'status-ring';
        icono.textContent = '🔒';
        actualizarUI();
      }
    }

    // ─── Toggle ───────────────────────────────────────────────────────
    async function toggle() {
      if (!charControl) { log('Sin conexión.', 'err'); return; }
      try {
        await charControl.writeValue(new TextEncoder().encode(PIN));
        log('Comando enviado, esperando confirmación...', 'info');
      } catch (err) {
        log('Error: ' + err.message, 'err');
      }
    }

    // ─── Al cargar ────────────────────────────────────────────────────
    window.addEventListener('load', () => {
      if (Notification.permission === 'granted') {
        notifActivas = true;
        btnNotif.textContent = '🔔 Notificaciones activas';
        btnNotif.className = 'btn btn-notif activo';
      }
    });
  </script>
</body>
</html>
